# Mikrus/LXC deployment: every service uses `network_mode: host` because the
# host kernel blocks sysctl writes Docker needs for bridge networking.
# See .ai/mikrus-deployment-notes.md gotchas #1–#4.
#
# Host port allocation:
#   8080 — nginx-proxy   (public — mikrus panel maps subdomain → 8080)
#   8082 — frontend (internal nginx, loopback-only via UFW)
#   3000 — backend (loopback-only via UFW)
#   5432 — postgres (loopback-only via listen_addresses + UFW)
#
# UFW must only allow 22 + 8080 inbound. Any service binding 0.0.0.0 on the
# other ports is firewall-isolated from the public; nginx-proxy reaches them
# via 127.0.0.1.
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gsd-postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DB: gsd
      POSTGRES_USER: gsd_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # Defense in depth: restrict postgres to loopback even though UFW blocks
    # the port externally.
    command:
      - postgres
      - -c
      - listen_addresses=127.0.0.1
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U gsd_user -d gsd"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${GHCR_REPO:-ghcr.io/martenn/gsd}/backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: production
    container_name: gsd-backend
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://gsd_user:${DB_PASSWORD}@127.0.0.1:5432/gsd
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${APP_URL}/api/auth/google/callback
      FRONTEND_URL: ${APP_URL}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ${GHCR_REPO:-ghcr.io/martenn/gsd}/frontend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # Baked into the Astro static bundle at build time.
        PUBLIC_API_URL: ${APP_URL}/api
    container_name: gsd-frontend
    restart: unless-stopped
    network_mode: host

  nginx-proxy:
    # Unprivileged image: runs as UID 101, listens on unprivileged ports.
    # Required because LXC blocks binds to <1024 inside containers.
    image: nginxinc/nginx-unprivileged:alpine
    container_name: gsd-nginx-proxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
